<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Budget Tracker</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery UI -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
}

.container-box{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1{
font-weight:bold;
}

.list-group-item{
display:flex;
justify-content:space-between;
align-items:center;
}

.item-info{
font-size:16px;
}

button{
margin-left:5px;
}

</style>
</head>

<body>

<div class="container my-5">

<div class="container-box">

<h1 class="text-center mb-4">Mini Budget Tracker</h1>

<!-- README BUTTON -->

<div class="text-center mb-4">
<a
href="https://github.com/kkisaku22/CIS-Silver/blob/ef6acdacbbeb2807dd24e7596aa7b95acdc9c92e/README.md"
target="_blank"
class="btn btn-outline-dark"
>
📖 Read Project Documentation
</a>
</div>


<!-- FORM -->

<form id="itemForm">

<div class="row g-2">

<div class="col-md-3">
<input
type="text"
class="form-control"
id="title"
placeholder="Title"
required
>
</div>

<div class="col-md-2">
<input
type="number"
class="form-control"
id="amount"
placeholder="Amount"
required
>
</div>

<div class="col-md-3">
<input
type="text"
class="form-control"
id="category"
placeholder="Category"
required
>
</div>

<div class="col-md-2">
<input
type="text"
class="form-control datepicker"
id="date"
placeholder="Date"
required
>
</div>

<div class="col-md-2">
<button
type="submit"
class="btn btn-primary w-100"
id="submitBtn"
>
Add Item
</button>
</div>

</div>

</form>

<hr>

<!-- ITEMS LIST -->

<div id="itemsList" class="list-group"></div>

</div>

</div>


<!-- jQuery -->

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

<!-- jQuery UI -->

<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>

$(function(){

$(".datepicker").datepicker({
dateFormat:"yy-mm-dd"
});

let editingId=null;

/* ---------------- LOAD ITEMS ---------------- */

function loadItems(){

$.get("/api/items",function(data){

const list=$("#itemsList");

list.empty();

data.forEach(item=>{

list.append(`

<div class="list-group-item">

<div class="item-info">

<strong>${item.title}</strong>
- $${item.amount}
(${item.category})
- ${item.date}

</div>

<div>

<button
class="btn btn-warning btn-sm editBtn"
data-id="${item._id}"
data-title="${item.title}"
data-amount="${item.amount}"
data-category="${item.category}"
data-date="${item.date}"
>

Edit

</button>

<button
class="btn btn-danger btn-sm deleteBtn"
data-id="${item._id}"
>

Delete

</button>

</div>

</div>

`);

});

});

}

loadItems();

/* ---------------- ADD OR UPDATE ---------------- */

$("#itemForm").submit(function(e){

e.preventDefault();

const payload={

title:$("#title").val(),

amount:$("#amount").val(),

category:$("#category").val(),

date:$("#date").val()

};

/* UPDATE */

if(editingId){

$.ajax({

url:`/api/items/${editingId}`,

type:"PUT",

data:JSON.stringify(payload),

contentType:"application/json",

success:function(){

loadItems();

$("#itemForm")[0].reset();

editingId=null;

$("#submitBtn").text("Add Item");

}

});

}

/* CREATE */

else{

$.post("/api/items",payload,function(){

loadItems();

$("#itemForm")[0].reset();

});

}

});

/* ---------------- DELETE ---------------- */

$("#itemsList").on("click",".deleteBtn",function(){

const id=$(this).data("id");

$.ajax({

url:`/api/items/${id}`,

type:"DELETE",

success:loadItems

});

});

/* ---------------- EDIT ---------------- */

$("#itemsList").on("click",".editBtn",function(){

editingId=$(this).data("id");

$("#title").val($(this).data("title"));

$("#amount").val($(this).data("amount"));

$("#category").val($(this).data("category"));

$("#date").val($(this).data("date"));

$("#submitBtn").text("Update Item");

});

});

</script>

</body>
</html>
