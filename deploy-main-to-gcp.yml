name: Deploy MiniApp to GCP

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 34.16.219.95 >> ~/.ssh/known_hosts

      - name: Deploy to GCP VM
        run: |
          ssh -o StrictHostKeyChecking=no karelkis23@34.16.219.95 << 'EOF'
            cd ~/prepare-mi-term

            git pull origin main

            npm install

            pm2 restart app || pm2 start app.mjs --name app

            pm2 save
          EOF
